<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF14 無名島 稀有生物即時追蹤</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #1e3a8a, #0f172a); }
        .pet-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .pet-active { background-color: #166534 !important; border-color: #86efac !important; box-shadow: 0 0 20px #4ade80; }
        .pet-gray { opacity: 0.65; filter: grayscale(60%); }
        .captured { text-decoration: line-through; opacity: 0.4; }
        .size-s { color: #60a5fa; }
        .size-m { color: #facc15; }
        .size-l { color: #f87171; }
    </style>
</head>
<body class="text-white min-h-screen pb-12">
    <div class="max-w-7xl mx-auto p-6">
        <header class="text-center mb-8">
            <div class="flex justify-center items-center gap-4">
                <h1 class="text-4xl font-bold">🦒 FF14 無名島 稀有生物追蹤</h1>
                <span class="text-sm text-slate-400 pt-3">By 利維坦 武惜肝 使用 Grok 整理</span>
            </div>
        </header>

        <div class="flex-1">
            <!-- babelin 風格頂部資訊 -->
            <div class="bg-slate-900/70 backdrop-blur rounded-2xl p-6 mb-8 border border-emerald-500/30">
                <div class="grid grid-cols-3 gap-6 text-center">
                    <div>
                        <p class="text-sm opacity-70">現實時間</p>
                        <p id="local-time" class="text-3xl font-mono font-bold"></p>
                    </div>
                    <div>
                        <p class="text-sm opacity-70">艾歐澤亞時間 (ET)</p>
                        <p id="et-time" class="text-5xl font-mono font-bold text-yellow-400"></p>
                    </div>
                    <div>
                        <p class="text-sm opacity-70">無名島天氣</p>
                        <p id="current-weather" class="text-3xl font-mono flex items-center justify-center gap-2"></p>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900/70 backdrop-blur rounded-2xl p-8 border border-amber-500/30">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl flex items-center gap-3"><i class="fas fa-paw"></i> 限時稀有生物列表</h2>
                    <button onclick="resetCaptured()" class="text-sm bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg">重置已抓取</button>
                </div>
                <div id="pet-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
        </div>

        <footer class="text-center text-xs opacity-50 mt-12">
            已抓取的生物會自動排到最底下 | 符合當前 ET 時間與天氣才會亮起
        </footer>
    </div>

    <script>
        const rarePets = [
            { id: "black_sheep", name: "黑羊", time: "全天", weather: "晴朗", size: "S" },
            { id: "lemur", name: "狐猴", time: "06:00-09:00", weather: "任意", size: "S" },
            { id: "magic_mushroom", name: "魔菇", time: "15:00-18:00", weather: "小雨", size: "S" },
            { id: "star_marmot", name: "星點栗鼠", time: "09:00-12:00", weather: "任意", size: "S" },
            { id: "beachcomb", name: "沙灘殼蟹", time: "00:00-03:00", weather: "小雨", size: "S" },
            { id: "shimmering", name: "闪烁毛球", time: "18:00-21:00", weather: "薄霧", size: "S" },
            { id: "paradise_apkallu", name: "樂園碧企鵝", time: "12:00-15:00", weather: "任意", size: "S" },
            { id: "yellow_coblyn", name: "黃色礦爬蟲", time: "全天", weather: "薄霧", size: "S" },
            { id: "magic_flower_bud", name: "魔界花骨朵", time: "03:00-06:00", weather: "陰雲", size: "S" },
            { id: "amethyst_spriggan", name: "紫晶魔石精", time: "21:00-24:00", weather: "任意", size: "S" },

            { id: "glyptodon", name: "雕齒獸", time: "00:00-03:00", weather: "任意", size: "M" },
            { id: "monkey_finch", name: "猴面雀", time: "12:00-15:00", weather: "晴朗", size: "M" },
            { id: "paradise_tiger", name: "樂園虎", time: "18:00-21:00", weather: "晴朗", size: "M" },
            { id: "black_chocobo", name: "黑陸行鳥", time: "全天", weather: "碧空", size: "M" },
            { id: "paradise_dodo", name: "樂園渡渡鳥", time: "15:00-18:00", weather: "任意", size: "M" },
            { id: "white_stag", name: "島嶼雄羚羊", time: "18:00-21:00", weather: "任意", size: "M" },
            { id: "alcinoe", name: "阿爾科諾斯特", time: "21:00-24:00", weather: "碧空", size: "M" },

            { id: "griffin", name: "獅鷲", time: "15:00-18:00", weather: "碧空", size: "L" },
            { id: "grand_buffalo", name: "巨水牛", time: "全天", weather: "陰雲", size: "L" },
            { id: "alligator", name: "短吻鱷", time: "06:00-09:00", weather: "暴雨", size: "L" },
            { id: "magic_flower", name: "魔界花", time: "21:00-24:00", weather: "暴雨", size: "L" },
            { id: "golden_tortoise", name: "精金龜", time: "12:00-15:00", weather: "薄霧", size: "L" },
            { id: "ancient_ape", name: "古菩猩猩", time: "09:00-12:00", weather: "陰雲", size: "L" },
            { id: "paradise_boar", name: "樂園疣猪", time: "全天", weather: "暴雨", size: "L" },
            { id: "wingless_dragon", name: "無齒翼龍", time: "09:00-12:00", weather: "碧空", size: "L" },
            { id: "giant_rock_beetle", name: "巨礦妖蟲", time: "03:00-06:00", weather: "晴朗", size: "L" },
            { id: "island_billy", name: "島嶼公山羊", time: "03:00-06:00", weather: "任意", size: "L" },
            { id: "gold_back", name: "黃金背魔鳥", time: "全天", weather: "小雨", size: "L" },
            { id: "strange_spriggan", name: "古怪魔石精", time: "00:00-03:00", weather: "薄霧", size: "L" }
        ];

        let captured = JSON.parse(localStorage.getItem('ff14_island_captured') || '{}');

        function getEorzeaTime() {
            const now = Date.now();
            const etDate = new Date(Math.floor(now * 20.57142857));
            const h = etDate.getUTCHours().toString().padStart(2, '0');
            const m = etDate.getUTCMinutes().toString().padStart(2, '0');
            return `${h}:${m}`;
        }

        function getCurrentWeather() {
            const unixSeconds = Math.floor(Date.now() / 1000);
            const bell = unixSeconds / 175;
            const increment = (Math.floor(bell) + 8 - (Math.floor(bell) % 8)) % 24;
            const totalDays = Math.floor(unixSeconds / 4200);
            const calcBase = totalDays * 100 + increment;
            const step1 = ((calcBase << 11) ^ calcBase) >>> 0;
            const step2 = ((step1 >>> 8) ^ step1) >>> 0;
            const chance = step2 % 100;

            if (chance < 25) return "碧空";
            else if (chance < 70) return "晴朗";
            else if (chance < 80) return "陰雲";
            else if (chance < 90) return "小雨";
            else if (chance < 95) return "薄霧";
            else return "暴雨";
        }

        function isCurrentlyAvailable(pet) {
            const etStr = getEorzeaTime();
            const hour = parseInt(etStr.split(':')[0]);

            // 時間符合
            let timeMatch = true;
            if (pet.time !== "全天") {
                const [startStr, endStr] = pet.time.split('-');
                const start = parseInt(startStr);
                const end = parseInt(endStr);
                timeMatch = (end > start) ? (hour >= start && hour < end) : (hour >= start || hour < end);
            }

            // 天氣符合（使用真實當前天氣）
            const currentWeather = getCurrentWeather();
            let weatherMatch = (pet.weather === "任意") || (pet.weather === currentWeather);

            return timeMatch && weatherMatch;
        }

        function toggleCaptured(id) {
            captured[id] = !captured[id];
            localStorage.setItem('ff14_island_captured', JSON.stringify(captured));
            updateUI();
        }

        function resetCaptured() {
            if (confirm('確定重置所有已抓取記錄？')) {
                captured = {};
                localStorage.removeItem('ff14_island_captured');
                updateUI();
            }
        }

        function updateUI() {
            const et = getEorzeaTime();
            const currentWeather = getCurrentWeather();

            document.getElementById('et-time').textContent = et;
            document.getElementById('local-time').textContent = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});

            // 頂部天氣顯示
            const weatherIconMap = {
                "碧空": "☀️", "晴朗": "🌤️", "陰雲": "☁️",
                "小雨": "🌧️", "薄霧": "🌫️", "暴雨": "⛈️"
            };
            document.getElementById('current-weather').innerHTML = `
                ${weatherIconMap[currentWeather] || '🌤️'} <span class="font-bold">${currentWeather}</span>
            `;

            // 排序：可抓取置頂 → 已抓取最底
            const sortedPets = [...rarePets].sort((a, b) => {
                const aAvail = isCurrentlyAvailable(a);
                const bAvail = isCurrentlyAvailable(b);
                if (aAvail !== bAvail) return bAvail - aAvail;

                const aCap = !!captured[a.id];
                const bCap = !!captured[b.id];
                if (aCap !== bCap) return aCap - bCap;

                return 0;
            });

            document.getElementById('pet-list').innerHTML = sortedPets.map(pet => {
                const isActive = isCurrentlyAvailable(pet);
                const isCap = !!captured[pet.id];
                const activeClass = isActive && !isCap ? 'pet-active' : 'pet-gray';
                const sizeColor = pet.size === 'S' ? 'size-s' : pet.size === 'M' ? 'size-m' : 'size-l';

                return `
                    <div class="pet-card bg-slate-800/70 rounded-2xl p-6 ${activeClass} border flex flex-col">
                        <div class="flex justify-between items-start">
                            <div class="${isCap ? 'captured' : ''}">
                                <p class="font-bold text-xl ${isActive && !isCap ? 'text-green-400' : ''}">${pet.name}</p>
                                <p class="text-amber-400 text-sm">${pet.time} (${pet.weather})</p>
                            </div>
                            <div class="text-right">
                                <span class="inline-block bg-slate-700 px-3 py-1 rounded-full text-sm ${sizeColor}">${pet.size}</span>
                                <p class="text-xs mt-2 ${isActive && !isCap ? 'text-green-400' : 'text-slate-400'}">${isActive ? '● 現在可抓' : '待機中'}</p>
                            </div>
                        </div>
                        <div class="mt-4 pt-4 border-t border-slate-700">
                            <label class="flex items-center gap-2 cursor-pointer text-sm">
                                <input type="checkbox" ${isCap ? 'checked' : ''} onchange="toggleCaptured('${pet.id}')" class="w-4 h-4 accent-green-500">
                                <span>已抓取過</span>
                            </label>
                        </div>
                    </div>
                `;
            }).join('');
        }

        setInterval(updateUI, 3000);
        updateUI();
    </script>
</body>
</html>
